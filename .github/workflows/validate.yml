name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: validate research portfolio
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate repository metadata
        run: python tools/validate_repository.py
