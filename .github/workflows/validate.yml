name: Validate

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      require-release-artifacts:
        description: "Fail if papers/ or notebooks/ still contain only README.md placeholders"
        required: false
        default: false
        type: boolean

jobs:
  validate:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    name: validate research portfolio
    runs-on: [self-hosted, Linux, X64, wsl, hummbl-papers]
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate repository metadata
        run: python tools/validate_repository.py

      - name: Validate repository guard behavior
        run: python tests/test_validate_repository.py

  validate-zenodo:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    name: validate .zenodo.json
    runs-on: [self-hosted, Linux, X64, wsl, hummbl-papers]
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install check-jsonschema
        run: python -m pip install --upgrade check-jsonschema

      - name: Validate Zenodo metadata against legacy deposit schema
        run: >
          check-jsonschema
          --schemafile
          https://raw.githubusercontent.com/zenodo/zenodo/master/zenodo/modules/deposit/jsonschemas/deposits/records/legacyrecord.json
          .zenodo.json

  validate-citation:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    name: validate CITATION.cff
    runs-on: [self-hosted, Linux, X64, wsl, hummbl-papers]
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install cffconvert
        run: python -m pip install --upgrade cffconvert==2.0.0

      - name: Validate Citation File Format metadata
        run: cffconvert --validate --infile CITATION.cff

  release-artifacts:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    name: validate release artifacts
    runs-on: [self-hosted, Linux, X64, wsl, hummbl-papers]
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Require paper and notebook artifacts
        run: >
          python -c "import os, subprocess, sys;
          should = os.environ.get('GITHUB_REF', '').startswith('refs/tags/v')
          or os.environ.get('INPUT_REQUIRE_RELEASE_ARTIFACTS', '').lower() == 'true';
          print('Release artifact validation required' if should else 'Skipping release artifact validation for non-release event');
          sys.exit(subprocess.call([sys.executable, 'tools/validate_repository.py', '--release-artifacts']) if should else 0)"
